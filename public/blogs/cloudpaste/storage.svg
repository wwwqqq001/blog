<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">CloudPaste 多存储架构图</title>
  <desc id="desc">展示 CloudPaste 通过统一管理层连接 R2、S3、WebDAV、OneDrive、Telegram 等多种存储。</desc>
  <rect width="960" height="520" rx="32" fill="#f0fdfa"/>
  <text x="64" y="72" fill="#0f172a" font-size="34" font-family="Arial, sans-serif" font-weight="700">CloudPaste 多存储实践</text>
  <text x="64" y="112" fill="#115e59" font-size="18" font-family="Arial, sans-serif">把文件管理、Markdown 分享和多存储接入放进一个统一入口。</text>
  <rect x="340" y="180" width="280" height="132" rx="28" fill="#0f766e"/>
  <text x="400" y="234" fill="#ecfdf5" font-size="24" font-family="Arial, sans-serif" font-weight="700">CloudPaste</text>
  <text x="390" y="270" fill="#ccfbf1" font-size="18" font-family="Arial, sans-serif">统一管理 / 分享 / 预览</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="82" y="160" width="150" height="72" rx="18" fill="#99f6e4"/>
    <text x="125" y="204" fill="#134e4a">R2</text>
    <rect x="82" y="284" width="150" height="72" rx="18" fill="#99f6e4"/>
    <text x="122" y="328" fill="#134e4a">S3</text>
    <rect x="728" y="128" width="150" height="72" rx="18" fill="#5eead4"/>
    <text x="770" y="172" fill="#134e4a">WebDAV</text>
    <rect x="728" y="252" width="150" height="72" rx="18" fill="#5eead4"/>
    <text x="765" y="296" fill="#134e4a">OneDrive</text>
    <rect x="728" y="376" width="150" height="72" rx="18" fill="#5eead4"/>
    <text x="762" y="420" fill="#134e4a">Telegram</text>
  </g>
  <g stroke="#0f766e" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M232 196h108"/>
    <path d="M232 320h108"/>
    <path d="M620 226c56-28 70-54 108-62"/>
    <path d="M620 256h108"/>
    <path d="M620 286c56 38 70 104 108 124"/>
  </g>
  <text x="90" y="446" fill="#115e59" font-size="17" font-family="Arial, sans-serif">重点不在“用哪个盘”，而在上传、预览、分享和权限能否被统一抽象。</text>
</svg>
