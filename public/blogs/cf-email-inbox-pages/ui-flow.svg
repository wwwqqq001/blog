<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">cf-email-inbox-pages 静态前端流程图</title>
  <desc id="desc">展示静态页面、本地 Token、Worker API 和邮件数据之间的关系。</desc>
  <rect width="960" height="520" rx="32" fill="#eff6ff"/>
  <text x="64" y="72" fill="#111827" font-size="34" font-family="Arial, sans-serif" font-weight="700">邮件管理静态前端</text>
  <text x="64" y="112" fill="#1d4ed8" font-size="18" font-family="Arial, sans-serif">前端独立发布，Token 留在浏览器本地，后端由 Worker API 提供。</text>
  <rect x="82" y="176" width="220" height="128" rx="22" fill="#bfdbfe"/>
  <text x="132" y="226" fill="#172554" font-size="23" font-family="Arial, sans-serif" font-weight="700">GitHub Pages</text>
  <text x="126" y="260" fill="#1e40af" font-size="17" font-family="Arial, sans-serif">HTML / CSS / JS</text>
  <rect x="382" y="176" width="210" height="128" rx="22" fill="#60a5fa"/>
  <text x="430" y="226" fill="#eff6ff" font-size="23" font-family="Arial, sans-serif" font-weight="700">浏览器</text>
  <text x="420" y="260" fill="#dbeafe" font-size="17" font-family="Arial, sans-serif">localStorage Token</text>
  <rect x="670" y="176" width="210" height="128" rx="22" fill="#2563eb"/>
  <text x="715" y="226" fill="#eff6ff" font-size="23" font-family="Arial, sans-serif" font-weight="700">Worker API</text>
  <text x="708" y="260" fill="#dbeafe" font-size="17" font-family="Arial, sans-serif">邮件列表 / 详情</text>
  <g stroke="#1d4ed8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M302 240h80"/>
    <path d="M370 228l14 12-14 12"/>
    <path d="M592 240h78"/>
    <path d="M658 228l14 12-14 12"/>
  </g>
  <rect x="172" y="368" width="620" height="78" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="208" y="402" fill="#172554" font-size="19" font-family="Arial, sans-serif" font-weight="700">安全取舍</text>
  <text x="208" y="430" fill="#1d4ed8" font-size="16" font-family="Arial, sans-serif">静态仓库不保存后端 Token；用户自己输入，浏览器本地保存，适合个人工具场景。</text>
</svg>
