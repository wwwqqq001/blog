<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">GLaDOS Heckin Cloudflare 架构图</title>
  <desc id="desc">展示浏览器手动触发、Cloudflare Cron、Workers Python、Secrets、GLaDOS API 和企业微信推送之间的关系。</desc>
  <rect width="960" height="520" rx="32" fill="#fffbeb"/>
  <text x="64" y="72" fill="#111827" font-size="34" font-family="Arial, sans-serif" font-weight="700">Workers Python 定时签到架构</text>
  <text x="64" y="112" fill="#92400e" font-size="18" font-family="Arial, sans-serif">一个短任务服务：Cron 触发、Secrets 存密钥、Worker 执行、通知返回结果。</text>
  <g font-family="Arial, sans-serif" font-size="19" font-weight="700">
    <rect x="74" y="176" width="190" height="80" rx="18" fill="#fde68a"/>
    <text x="112" y="224" fill="#111827">Cron 定时器</text>
