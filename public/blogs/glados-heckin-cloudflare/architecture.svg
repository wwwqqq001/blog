    <text x="384" y="260" fill="#fff7ed">Cloudflare</text>
    <text x="384" y="292" fill="#fff7ed">Workers Python</text>
    <rect x="650" y="154" width="210" height="80" rx="18" fill="#fed7aa"/>
    <text x="692" y="203" fill="#111827">Secrets / Vars</text>
    <rect x="650" y="274" width="210" height="80" rx="18" fill="#fdba74"/>
    <text x="704" y="322" fill="#111827">GLaDOS API</text>
    <rect x="650" y="394" width="210" height="80" rx="18" fill="#ea580c"/>
    <text x="704" y="442" fill="#fff7ed">企业微信推送</text>
  </g>
  <g stroke="#92400e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M264 216h82"/>
    <path d="M334 204l14 12-14 12"/>
    <path d="M264 344c52 0 52-70 82-70"/>
    <path d="M334 262l14 12-14 12"/>
