<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Hyperdown Cloudflare 架构图</title>
  <desc id="desc">平台或手动请求触发 Python Worker，读写 KV，调用 Hyperdown API，回传结构化结果。</desc>
  <rect width="960" height="520" rx="32" fill="#ecfdf5"/>
  <text x="56" y="64" fill="#064e3b" font-size="32" font-family="Arial, sans-serif" font-weight="700">Python Worker 业务 Handler</text>
  <text x="56" y="100" fill="#047857" font-size="17" font-family="Arial, sans-serif">签到与公告拆成不同入口；线上主调度交给统一平台，Worker 负责执行和状态展示。</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="56" y="170" width="200" height="80" rx="16" fill="#a7f3d0"/>
    <text x="90" y="218" fill="#064e3b">调度平台</text>
    <rect x="56" y="280" width="200" height="80" rx="16" fill="#6ee7b7"/>
    <text x="90" y="328" fill="#064e3b">手动面板</text>
    <rect x="330" y="210" width="250" height="110" rx="20" fill="#059669"/>
    <text x="370" y="258" fill="#ecfdf5">hyper-checkin</text>
    <text x="370" y="288" fill="#d1fae5" font-size="15" font-weight="500">Python Workers</text>
    <rect x="660" y="150" width="220" height="74" rx="16" fill="#34d399"/>
    <text x="710" y="194" fill="#064e3b">KV 状态</text>
    <rect x="660" y="250" width="220" height="74" rx="16" fill="#10b981"/>
    <text x="700" y="294" fill="#ecfdf5">Hyperdown API</text>
    <rect x="660" y="350" width="220" height="74" rx="16" fill="#047857"/>
    <text x="700" y="394" fill="#ecfdf5">标准 payload</text>
  </g>
  <g stroke="#065f46" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M256 210h74"/>
    <path d="M256 320c40 0 40-40 74-40"/>
    <path d="M580 250h80"/>
    <path d="M580 280h80"/>
    <path d="M580 310c40 40 40 60 80 70"/>
  </g>
</svg>
